name: Release

# Cut a release by pushing a semver tag:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds the production Docker image, pushes it to GHCR, and creates a
# GitHub Release with generated notes. Conventions mirror fremvaerk/stroem.

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # create the GitHub Release
  packages: write # push the image to GHCR

env:
  REGISTRY: ghcr.io

jobs:
  build-image:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          # → ghcr.io/fremvaerk/roadtripplanner (lowercased automatically)
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # No build-args: the Maps browser key/map id are runtime env (read by the
          # server and passed to the client), so no secrets are baked into the image.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version (strip leading v)
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          append_body: true
          body: |
            **Docker image**
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ steps.v.outputs.version }}
            ```
